services:
  - type: web
    name: lawyer-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - fromDatabase:
          name: lawyer-portal-db
          property: connectionString
